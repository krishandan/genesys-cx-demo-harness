# Northwind Mobile — seed pack.
# A new customer is a new pack directory, not new code.
tenant:
  slug: northwind
  display_name: Northwind Mobile
  industry: telco
  branding_json:
    primary_color: "#0B5FFF"
    accent_color: "#00C2A8"
    logo_text: Northwind Mobile
    support_hours: "24/7"
    voice: friendly-direct
  config_json:
    # Resolves bare national numbers (07700900000) to E.164 at the gx boundary.
    country: GB
    # Shape of masked_name in the verify-customer response.
    masked_name:
      reveal_chars: 1
      mask_char: "*"
      mask_length: 3
    # Network module thresholds. Anything omitted falls back to the module defaults
    # in app/modules/network/config.py.
    network:
      poor_rssi_dbm: -70
      steer_target_band: "5"
      steer_rssi_gain_db: 22
      steer_rssi_ceiling_dbm: -45
      poor_backhaul_quality: 40
      healthy_backhaul_quality: 92
      # Least disruptive remedy first: a band steer is invisible to the customer,
      # rebooting an extender drops it. This order is what makes the demo run
      # band-steer before reboot-extender.
      fault_precedence: [wan_degraded, device_band_stuck, extender_flapping]
      # Coverage weakness thresholds (durable, fault-independent). The demo home reads
      # "weak" because two devices upstairs (Ella's iPad and Work Laptop, both on the
      # Upstairs Extender) sit below edge_rssi_5ghz_dbm — a cluster >= min_cluster_size.
      # After a band-steer moves the iPad back to a strong signal, Work Laptop alone stays
      # below single_worst_rssi_dbm, so coverage stays weak. Reboot does not move devices.
      coverage:
        edge_rssi_5ghz_dbm: -60
        edge_rssi_24ghz_dbm: -68
        min_cluster_size: 2
        single_worst_rssi_dbm: -58
    # Shape of sent_to_masked in the order confirmation response.
    masked_email:
      reveal_chars: 1
      mask_char: "•"
      mask_length: 4
    # ── Offer catalogue ───────────────────────────────────────────────────────
    # Adding an offer is a pack edit. Eligibility is evaluated against the
    # subscriber's real topology by the predicates in
    # app/modules/offers/service.py — never against a subscriber id.
    # Pack order is priority: the first eligible offer wins.
    offers:
      default_eta_text: arrives in 3–5 working days
      catalogue:
        - offer_id: NW-MESH-PRO
          name: Northwind Mesh Pro
          price_gbp: 6.0
          # Fallback reason only; when coverage is weak the endpoint returns the live
          # coverage_note instead, so the offer and net-status tell one story.
          reason: >-
            a cluster of devices upstairs is hanging at the edge of the booster's range
          eligibility:
            # Single source of truth: eligible exactly when the coverage assessment reads
            # weak (app/modules/network/coverage.py). Durable — keyed off distance, not
            # fault state — so the offer survives the self-heal.
            coverage_is_weak: true

seed:
  faker_seed: 20260716        # fixed → deterministic re-seed
  faker_locale: en_GB
  party_count: 10
  party_type: person
  tiers: [bronze, silver, gold]
  identities: [phone, email, account_no]
  # One factor per party, stored only as a hash. A known value (rather than BE-0's
  # random Faker dob) so a demo and the gx verify happy path can actually assert it.
  # Demo 1 authenticates with two collects: mobile number, then this PIN. Five digits
  # (BE-5) — a PIN verifies, it cannot identify, so the number is collected first.
  verification:
    factor_type: pin
    value_pattern: "24680"
  contact_channels: [sms, email]
  # Ofcom reserves +447700900xxx for fiction: no seeded number can reach a real person.
  phone_pattern: "+447700900{index:03d}"
  email_domain: example.net   # RFC 2606 reserved
  account_pattern: "NW{index:06d}"

  # ── Home networks ──────────────────────────────────────────────────────────
  # The topology is pack data, not code.
  #
  # This is the BASELINE and it is HEALTHY. Faults are staged by the scenario
  # engine (app/scenarios/packs/northwind/), not seeded. `reset` re-materializes
  # exactly what is described here, which is why a demo needs no `make seed`
  # between takes.
  network:
    assign:
      demo_home: [0]        # +447700900000 — the WiFi demo subscriber
      standard_home: [1, 2, 3]
    profiles:
      # The demo subscriber's home. Everything healthy; `wifi_degraded` breaks it.
      demo_home:
        gateway:
          key: gateway
          model: Northwind Hub 6
          wan_status: online
          uptime_s: 482913
        access_points:
          - key: hub
            label: Living Room Hub
            kind: gateway
            model: Northwind Hub 6
            status: online
            backhaul_quality: 100
          - key: ext1
            label: Upstairs Extender
            kind: extender
            model: Northwind Mesh Point
            status: online
            backhaul_quality: 96
        radios:
          # The hub carries both bands: that 5GHz radio is what makes the phone
          # steerable once wifi_degraded pins it to 2.4.
          - {ap: hub, band: "2.4", channel: 6, utilization: 24}
          - {ap: hub, band: "5", channel: 44, utilization: 22}
          - {ap: ext1, band: "2.4", channel: 6, utilization: 19}
          - {ap: ext1, band: "5", channel: 44, utilization: 18}
        devices:
          # Family-named devices: the customer says "my daughter's iPad", and the agent
          # matches that against these labels via /gx/devices.
          - key: phone
            label: "{first_name}'s Phone"
            kind: phone
            ap: hub
            band: "5"
            rssi: -48
            steer_eligible: true
          - key: ipad
            # The device wifi_degraded faults, so the customer's complaint and the
            # diagnostic verdict name the same thing. At baseline it sits at the edge of
            # the Upstairs Extender's range (below edge_rssi_5ghz_dbm), forming — with the
            # Work Laptop — the >=2 device cluster that makes coverage read "weak".
            label: Ella's iPad
            kind: tablet
            ap: ext1
            band: "5"
            rssi: -62
            steer_eligible: true
          - key: laptop
            # Also on the Upstairs Extender at the edge of range, and NEVER touched by a
            # fix. After a band-steer moves the iPad to a strong signal, this device alone
            # keeps coverage "weak" (below single_worst_rssi_dbm) — the durable gap.
            label: Work Laptop
            kind: laptop
            ap: ext1
            band: "5"
            rssi: -61
            steer_eligible: true
          - key: tv
            label: Living Room TV
            kind: tv
            ap: hub
            band: "5"
            rssi: -52
            steer_eligible: false
      standard_home:
        gateway:
          key: gateway
          model: Northwind Hub 6
          wan_status: online
          uptime_s: 903221
        access_points:
          - key: hub
            label: Living Room Hub
            kind: gateway
            model: Northwind Hub 6
            status: online
            backhaul_quality: 100
          - key: ext1
            label: Upstairs Extender
            kind: extender
            model: Northwind Mesh Point
            status: online
            backhaul_quality: 96
        radios:
          - {ap: hub, band: "2.4", channel: 1, utilization: 18}
          - {ap: hub, band: "5", channel: 36, utilization: 14}
          - {ap: ext1, band: "5", channel: 36, utilization: 11}
        devices:
          - key: phone
            label: "{first_name}'s Phone"
            kind: phone
            ap: hub
            band: "5"
            rssi: -48
            steer_eligible: true
          - key: laptop
            # Comfortably within range (well above the edge threshold), so a standard
            # home reads coverage "good" and is NOT offer-eligible — a clean contrast.
            label: Work Laptop
            kind: laptop
            ap: ext1
            band: "5"
            rssi: -52
            steer_eligible: true
