# Test-only second tenant, used to prove tenant isolation.
tenant:
  slug: acme
  display_name: Acme Telecom
  industry: telco
  branding_json:
    primary_color: "#FF6B00"
  config_json:
    country: GB
    masked_name:
      reveal_chars: 1
      mask_char: "*"
      mask_length: 3

seed:
  faker_seed: 999
  faker_locale: en_GB
  party_count: 3
  party_type: person
  tiers: [bronze]
  identities: [phone, email]
  verification:
    factor_type: pin
    value_pattern: "9{index:03d}"
  contact_channels: [sms]
  phone_pattern: "+447700901{index:03d}"
  email_domain: example.org
  account_pattern: "AC{index:06d}"
  # A second tenant with its own degraded network, so cross-tenant action tests can
  # prove one tenant's target cannot be acted on while scoped to another.
  network:
    assign:
      degraded: [0]
    profiles:
      degraded:
        gateway: {model: Acme Box, wan_status: online, uptime_s: 1000}
        access_points:
          - {key: hub, label: Acme Hub, kind: gateway, model: Acme Box, status: online, backhaul_quality: 100}
          - {key: ext1, label: Acme Extender, kind: extender, model: Acme Point, status: flapping, backhaul_quality: 30}
        radios:
          - {ap: hub, band: "2.4", channel: 6, utilization: 50}
          - {ap: hub, band: "5", channel: 44, utilization: 20}
        devices:
          - {key: phone, label: Acme Phone, ap: hub, band: "2.4", rssi: -80, steer_eligible: true}
